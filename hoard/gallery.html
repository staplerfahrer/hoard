<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=0.3">
	<meta charset="UTF-8">
	<title>hoard</title>
	<link rel="icon"       type="image/svg+xml" href="/favicon.svg">
	<link rel="stylesheet" type="text/css"      href="/style.css">
	<style id="slowZoomSheet"></style>
</head>
<body>
	<div id="viewBox">
		<img id="viewImg">
		<img id="viewImg2">
		<img id="viewImg3">
		<video id="viewVideo" controls loop></video>
		<iframe id="viewPdf" style="display:none;width:90vw;height:90vh;margin:auto;border:none;border-radius:4px;"></iframe>
		<button id="viewPdfClose" style="display:none;position:absolute;top:8px;right:12px;background:none;border:none;color:#c09300;font-size:2rem;cursor:pointer;z-index:10;line-height:1;text-shadow:0 0 4px black;">&#x2715;</button>
	</div>
	<div id="autoPlayButton"></div>
	<div id="topBar">
		<a id="navPrevious">&larr;</a>
		<a id="navUp">&uarr;</a>
		<a id="navNext">&rarr;</a>
		<a id="navAll" title="Show all files in this folder and every subfolder">&#x29C9; all</a>
		<div id="titleContainer"></div>
	</div>
	<div id="thumbnailContainer">
		<div id="siblings"></div>
		<div id="children"></div>
	</div>
	<div id="backToTop">&uarr;</div>
	<!-- per-request data island; the viewer + thumbnail modules are cached /*.js -->
	<script id="bootstrap" type="application/json">{bootstrap}</script>
	<script>var boot = JSON.parse(document.getElementById('bootstrap').textContent)</script>
	<script src="/thumbs.js"></script>
	<script src="/gallery.js"></script>
</body>
</html>
